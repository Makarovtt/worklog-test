services:
  db:
    image: postgres:16-alpine
    container_name: worklog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: worklog
      POSTGRES_PASSWORD: worklog
      POSTGRES_DB: worklog
    ports:
      - '5432:5432'
    volumes:
      - worklog-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U worklog -d worklog']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worklog-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://worklog:worklog@db:5432/worklog?schema=public
      JWT_SECRET: change-me-in-production-please-32chars
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      RUN_SEED: 'true'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/v1/health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    ports:
      - '3000:3000'

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    container_name: worklog-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '5173:80'

volumes:
  worklog-db-data:
